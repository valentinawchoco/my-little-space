<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my little yearbook 2326 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff0f3; 
            --text-color: #ff4d6d;
            --font-main: "Playfair Display", "Garamond", serif;
            --font-body: "Nunito", sans-serif;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-body); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 40px 20px; text-align: center; }
        h1 { font-family: var(--font-main); font-size: 2.5rem; font-style: italic; font-weight: 400; }
        .spotify-box { width: 100%; max-width: 600px; margin: 20px 0; }
        .form-box { width: 100%; max-width: 600px; background: white; border-radius: 20px; padding: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .floating-icons { position: fixed; z-index: -1; font-size: 2rem; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="floating-icons" style="top: 10%; left: 5%;">✨</div>
    <div class="floating-icons" style="top: 20%; right: 8%;">☁️</div>
    <div class="floating-icons" style="bottom: 15%; left: 10%;">🎀</div>
    <div class="floating-icons" style="bottom: 5%; right: 5%;">🧸</div>

    <h1>Souls don't meet by accident</h1>
    <p style="font-family: 'EB Garamond', serif; font-style: italic;">"những linh hồn không tình cờ gặp nhau."</p>

    <!-- CHỖ DÁN LINK SPOTIFY (Cái link dài ngoằng ấy) -->
    <div class="spotify-box">
        
        <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/5cKfvCrk8D8sxTz4CYHDFX?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

    </div>

    <!-- CHỖ DÁN LINK GOOGLE FORM -->
    <div class="form-box">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd7WfwkEaRD3xDuzbQ9136JOD6mzlWDCcHDeJsIzJnQINDR3A/viewform" width="100%" height="800" frameborder="0">Đang tải...</iframe>
    </div>

    <p style="margin-top: 30px; font-size: 0.8rem; opacity: 0.6;">Made with ♡ by nấm</p>

</body>
</html>
