<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my memory book 2326 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-main: "Playfair Display", serif;
            --font-body: "Nunito", sans-serif;
        }

        /* Nền Gradient Đen - Hồng */
        body {
            background: linear-gradient(180deg, #000000 0%, #ff85a1 45%, #fff0f3 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 60px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Tạo hiệu ứng lấp lánh (Blink Blink) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            z-index: 0;
            opacity: 0.6;
            animation: blink 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            100% { opacity: 0.8; }
        }

        .container {
            width: 100%;
            max-width: 650px;
            text-align: center;
            z-index: 1; /* Để nội dung nổi lên trên lớp lấp lánh */
        }

        h1 {
            font-family: var(--font-main);
            font-size: 3rem;
            font-style: italic;
            font-weight: 400;
            color: #ffb3c1; 
            margin-bottom: 10px;
            text-shadow: 2px 2px 15px rgba(255, 179, 193, 0.6);
        }

        .quote {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        .spotify-box {
            width: 100%;
            margin-bottom: 40px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-top: 20px;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #7a5980;
            opacity: 0.8;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>my memory book 2326</h1>
        <p class="quote">"souls don't meet by accident."</p>

        <div class="spotify-box">
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/5cKfvCrk8D8sxTz4CYHDFX?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <p style="color: #ffffff; font-weight: bold; margin-bottom: 20px; font-style: italic; opacity: 0.9;">˗ˏˋ cảm ơn tình yêu đã ghé thăm ˎˊ˗</p>

        <div class="form-box">
            <!-- NẤM DÁN LINK FORM VÀO ĐÂY LẦN CUỐI NHÉ -->
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd7WfwkEaRD3xDuzbQ9136JOD6mzlWDCcHDeJsIzJnQINDR3A/viewform" width="100%" height="1000" frameborder="0" marginheight="0" marginwidth="0">Đang tải...</iframe>
        </div>

        <div class="footer">
            made with ♡ by nấm
        </div>
    </div>

</body>
</html>
