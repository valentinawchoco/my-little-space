<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my little yearbook 2326🌸</title>
    
    <!-- Link Font từ Google -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-main: "Playfair Display", "Garamond", serif;
            --font-body: "Nunito", sans-serif;
        }

        body {
            /* Gradient Đen ở trên, Hồng ở dưới */
            background: linear-gradient(180deg, #000000 0%, #ff85a1 50%, #fff0f3 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 60px 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        h1 {
            font-family: var(--font-main);
            font-size: 2.8rem;
            font-style: italic;
            font-weight: 400;
            color: #ffb3c1; /* Màu hồng nhạt nổi trên nền đen */
            margin-bottom: 10px;
            text-shadow: 2px 2px 15px rgba(255, 179, 193, 0.4);
        }

        .quote {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        .spotify-box {
            width: 100%;
            margin-bottom: 50px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .form-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        iframe {
            border-radius: 15px;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #7a5980;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>my yearbook 2326</h1>
        <p class="quote">"souls don't meet by accident."</p>

        <!-- PHẦN 1: SPOTIFY (Phát trước) -->
        <div class="spotify-box">
            <!-- THAY TOÀN BỘ DÒNG IFRAME DƯỚI ĐÂY BẰNG MÃ NHÚNG SPOTIFY DÀI NGOẰNG CỦA CẬU -->
            <iframe style="border-radius:12px" src="<iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/5cKfvCrk8D8sxTz4CYHDFX?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <p style="color: #ff4d6d; font-weight: bold; margin-bottom: 15px;">˗ˏˋ Viết cho tớ vài dòng nhé ˎˊ˗</p>

        <!-- PHẦN 2: GOOGLE FORMS (Hiện sau) -->
        <div class="form-box">
            <!-- THAY LINK GOOGLE FORM CỦA CẬU VÀO ĐÂY -->
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd7WfwkEaRD3xDuzbQ9136JOD6mzlWDCcHDeJsIzJnQINDR3A/viewform" width="100%" height="900" frameborder="0" marginheight="0" marginwidth="0">Đang tải...</iframe>
        </div>

        <div class="footer">
            Made with ♡ by nấm
        </div>
    </div>

</body>
</html>
