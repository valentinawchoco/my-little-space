<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my memory book 2326 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-main: "Playfair Display", serif;
            --font-body: "Nunito", sans-serif;
            --sparkle-color: #ffe5ec;
        }

        body {
            background: linear-gradient(180deg, #000000 0%, #ff85a1 45%, #fff0f3 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 60px 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* --- HIỆU ỨNG SAO 4 CÁNH ✨ --- */
        .sparkle-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .sparkle {
            position: absolute;
            width: 20px; height: 20px;
            animation: twinkle var(--d) infinite;
            opacity: 0;
        }

        /* Tạo dáng sao 4 cánh bằng CSS */
        .sparkle:before, .sparkle:after {
            content: "";
            position: absolute;
            background: var(--sparkle-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--sparkle-color), 0 0 20px #fff;
        }

        .sparkle:before {
            width: 100%; height: 20%;
            top: 40%; left: 0;
        }

        .sparkle:after {
            width: 20%; height: 100%;
            left: 40%; top: 0;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1) rotate(90deg); opacity: 0.8; }
        }

        /* Vị trí các ngôi sao ✨ */
        .sp1 { top: 10%; left: 15%; --d: 4s; }
        .sp2 { top: 25%; right: 10%; --d: 5s; }
        .sp3 { top: 45%; left: 8%; --d: 6s; }
        .sp4 { top: 65%; right: 15%; --d: 4.5s; }
        .sp5 { top: 80%; left: 20%; --d: 7s; }
        .sp6 { top: 15%; right: 30%; --d: 3.5s; }

        /* --- NỘI DUNG --- */
        .container {
            width: 100%;
            max-width: 650px;
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-family: var(--font-main);
            font-size: 3rem;
            font-style: italic;
            font-weight: 400;
            color: #ffb3c1; 
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 179, 193, 0.6);
        }

        .quote {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .spotify-box {
            width: 100%;
            margin-bottom: 40px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .form-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #7a5980;
            opacity: 0.8;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="sparkle-container">
        <div class="sparkle sp1"></div>
        <div class="sparkle sp2"></div>
        <div class="sparkle sp3"></div>
        <div class="sparkle sp4"></div>
        <div class="sparkle sp5"></div>
        <div class="sparkle sp6"></div>
    </div>

    <div class="container">
        <h1>my memory book 2326</h1>
        <p class="quote">"souls don't meet by accident."</p>

        <div class="spotify-box">
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/5cKfvCrk8D8sxTz4CYHDFX?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <p style="color: #ffffff; font-weight: bold; margin-bottom: 20px; font-style: italic; opacity: 0.9;">˗ˏˋ cảm ơn tình yêu đã ghé thăm ˎˊ˗</p>

        <div class="form-box">
            <!-- NẤM DÁN LINK GOOGLE FORM VÀO ĐÂY NHÉ -->
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd7WfwkEaRD3xDuzbQ9136JOD6mzlWDCcHDeJsIzJnQINDR3A/viewform" width="100%" height="1000" frameborder="0">Đang tải...</iframe>
        </div>

        <div class="footer">
            made with ♡ by nấm
        </div>
    </div>

</body>
</html>
